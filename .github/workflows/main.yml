name: Android Build
on:
  push:
    branches: [ "main", "master" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Find gradlew and Build
      run: |
        # هذا الأمر يبحث عن مكان مجلد المشروع ويدخل إليه تلقائياً
        PROJECT_DIR=$(dirname $(find . -name "gradlew" | head -n 1))
        echo "Found gradlew in: $PROJECT_DIR"
        cd "$PROJECT_DIR"
        
        # إعطاء الصلاحية وبناء التطبيق
        chmod +x gradlew
        ./gradlew assembleDebug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        # النجمتين ** تعني أنه سيبحث عن الـ APK في أي مجلد فرعي ويجلبه
        path: '**/app/build/outputs/apk/debug/app-debug.apk'
