name: Android Build
on:
  push:
    branches: [ "main", "master" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Official Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.9' # تم التحديث إلى الإصدار المطلوب 8.9
        cache-disabled: true

    - name: Build Application
      run: |
        # البحث عن مجلد المشروع الأساسي والدخول إليه
        PROJECT_DIR=$(dirname $(find . -name "build.gradle.kts" | head -n 1))
        echo "Building in: $PROJECT_DIR"
        cd "$PROJECT_DIR"
        
        # استخدام المحرك لبناء التطبيق
        gradle assembleDebug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: '**/app/build/outputs/apk/debug/app-debug.apk'
